---
# ===== Proxmox接続情報 =====
proxmox_host: "192.168.1.10"
proxmox_api_host: "{{ proxmox_host }}"
proxmox_api_port: 8006
proxmox_user: "root@pam"
proxmox_password: "{{ vault_proxmox_password }}"
proxmox_node: "pve01"

# ===== VM共通設定 =====
vm_template_id: 9000
vm_template_name: "debian12-cloud-template"
vm_storage: "local-lvm"
vm_bridge: "vmbr0"
vm_gateway: "192.168.1.1"
vm_netmask: 24
vm_nameserver: "192.168.1.1"
vm_searchdomain: "k8s.local"

# ===== cloud-init設定 =====
cloud_init_user: "k8s"
cloud_init_password: "{{ vault_cloud_init_password }}"
cloud_init_ssh_public_key: "{{ vault_ssh_public_key }}"

# ===== Debian cloud image =====
debian_cloud_image_url: "https://cloud.debian.org/images/cloud/bookworm/latest/debian-12-generic-amd64.qcow2"
debian_cloud_image_file: "debian-12-generic-amd64.qcow2"
