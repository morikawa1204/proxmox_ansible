---
all:
  children:
    # Proxmoxホスト (VM作成用)
    proxmox:
      hosts:
        pve01:
          ansible_host: "{{ proxmox_host }}"
          ansible_user: root
          ansible_python_interpreter: /usr/bin/python3

    # K8sクラスタノード
    k8s_cluster:
      children:
        control_plane:
          hosts:
            k8s-cp01:
              ansible_host: 192.168.1.101
              vm_id: 201
        workers:
          hosts:
            k8s-worker01:
              ansible_host: 192.168.1.102
              vm_id: 202
            k8s-worker02:
              ansible_host: 192.168.1.103
              vm_id: 203
        storage:
          hosts:
            k8s-storage01:
              ansible_host: 192.168.1.104
              vm_id: 204
      vars:
        ansible_user: k8s
        ansible_python_interpreter: /usr/bin/python3
